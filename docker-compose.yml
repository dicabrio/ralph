services:
  ralph-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ralph-dashboard
    ports:
      - "9000:9000"
    volumes:
      # Database storage (SQLite)
      - ${DATA_PATH:-./data}:/data
      # Projects folder (read-only for scanning, writable for prd.json updates)
      # IMPORTANT: Set PROJECTS_ROOT in your .env file to point to your projects folder
      - ${PROJECTS_ROOT:-./projects}:/projects
      # Skills folder (central skills library)
      - ${SKILLS_PATH:-./skills}:/skills
      # Docker socket mount - allows Ralph to spawn Claude containers
      # This enables Docker-out-of-Docker (DooD) pattern
      - /var/run/docker.sock:/var/run/docker.sock
      # Claude config file (optional - for using Claude Max/Pro subscription)
      # Uncomment the line below to use your local Claude plan instead of API key
      # - ~/.claude.json:/root/.claude.json:ro
    environment:
      - NODE_ENV=production
      - PORT=9000
      - HOST=0.0.0.0
      # Database path inside container
      - DATA_PATH=/data
      # Projects root inside container
      - PROJECTS_ROOT=/projects
      # Skills path inside container
      - SKILLS_PATH=/skills
      # Host paths for Claude container mounts (used by runner to pass to Claude)
      - HOST_PROJECTS_ROOT=${PROJECTS_ROOT:-./projects}
      - HOST_SKILLS_PATH=${SKILLS_PATH:-./skills}
      # Claude authentication (choose ONE method):
      # Method 1: API Key (for API access)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Method 2: Claude config file path on HOST (for Claude Max/Pro subscription)
      # Set this to ~/.claude.json to use your local Claude plan
      - HOST_CLAUDE_CONFIG=${HOST_CLAUDE_CONFIG:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Claude Code container reference configuration
  # This service is NOT started directly via docker-compose
  # Instead, it serves as documentation for how Ralph spawns Claude containers
  # The ralph-app container uses the Docker API to start claude-runner instances dynamically
  #
  # Authentication: Ralph supports TWO methods for Claude authentication:
  #
  # Method 1: API Key (for API access)
  #   docker run --name claude-runner-<project-id> \
  #     -e ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY \
  #     -v /host/path/to/project:/workspace \
  #     -v /host/path/to/skills:/skills:ro \
  #     -w /workspace \
  #     -it anthropics/claude-code:latest
  #
  # Method 2: Claude Config (for Claude Max/Pro subscription)
  #   docker run --name claude-runner-<project-id> \
  #     -v ~/.claude.json:/root/.claude.json:ro \
  #     -v /host/path/to/project:/workspace \
  #     -v /host/path/to/skills:/skills:ro \
  #     -w /workspace \
  #     -it anthropics/claude-code:latest
  #
  # See scripts/start-claude-runner.sh for the actual implementation
  claude-runner:
    image: anthropics/claude-code:latest
    profiles:
      - manual  # Prevents starting with 'docker-compose up'
    container_name: claude-runner-${PROJECT_ID:-default}
    # Volumes are mounted dynamically by Ralph based on project configuration:
    # - Project folder with read/write access for code changes
    # - Skills folder for agent prompts
    # - Claude config (optional, for Max/Pro subscription)
    # Note: PROJECT_PATH is set dynamically when starting the container
    volumes:
      - ${PROJECT_PATH:-/tmp/placeholder}:/workspace
      - ${SKILLS_PATH:-./skills}:/skills:ro
      # Uncomment for Claude Max/Pro subscription:
      # - ${HOST_CLAUDE_CONFIG:-~/.claude.json}:/root/.claude.json:ro
    environment:
      # Only needed for API key auth, leave empty for config file auth
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    working_dir: /workspace
    # Container runs interactively and exits when done
    stdin_open: true
    tty: true
